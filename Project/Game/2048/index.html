<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048游戏</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            line-height: 1;
        }

        .scores {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background-color: #bbada0;
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            text-align: center;
            min-width: 70px;
        }

        .score-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.3;
        }

        .game-board {
            background-color: #bbada0;
            border-radius: 8px;
            padding: 12px;
            position: relative;
            margin-bottom: 16px;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        .grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }

        .cell {
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 4px;
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 32px;
            transition: top 0.12s ease-out, left 0.12s ease-out, transform 0.12s ease-out, opacity 0.12s ease-out;
            z-index: 10;
            will-change: top, left, transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .tile-appear {
            animation: tilePop 0.18s ease-out forwards;
        }

        @keyframes tilePop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            60% {
                transform: scale(1.08);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tile-merged {
            animation: tileMerge 0.22s ease-out forwards;
        }

        @keyframes tileMerge {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            40% {
                transform: scale(1.25);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: fadeIn 0.4s ease-out;
        }

        .game-over-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .game-over-overlay .go-title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 8px;
        }

        .game-over-overlay .go-score {
            font-size: 22px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over-overlay .go-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 36px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
        }

        .game-over-overlay .go-btn:hover {
            background: #9f8b76;
        }

        .game-over-overlay .go-btn:active {
            transform: scale(0.95);
        }

        .instructions {
            font-size: 13px;
            line-height: 1.6;
            color: #776e65;
            opacity: 0.8;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .instructions strong {
            opacity: 1;
        }

        @media (max-width: 520px) {
            body {
                padding: 10px;
            }

            .title {
                font-size: 36px;
            }

            .score-box {
                padding: 4px 12px;
                min-width: 56px;
            }

            .score-value {
                font-size: 18px;
            }

            .game-board {
                padding: 10px;
                border-radius: 6px;
            }

            .grid {
                gap: 10px;
            }

            .tile {
                font-size: 24px;
                border-radius: 3px;
            }

            .game-over-overlay .go-title {
                font-size: 34px;
            }
            .game-over-overlay .go-score {
                font-size: 18px;
            }
            .game-over-overlay .go-btn {
                padding: 8px 28px;
                font-size: 16px;
            }
        }

        @media (max-width: 400px) {
            .title {
                font-size: 28px;
            }

            .score-box {
                padding: 3px 8px;
                min-width: 46px;
            }

            .score-value {
                font-size: 15px;
            }
            .score-title {
                font-size: 9px;
            }

            .game-board {
                padding: 8px;
            }

            .grid {
                gap: 8px;
            }

            .tile {
                font-size: 18px;
                border-radius: 3px;
            }

            .game-over-overlay .go-title {
                font-size: 26px;
            }
        }

        @media (min-width: 600px) {
            .tile {
                font-size: 48px;
            }
        }

        .hidden {
            display: none !important;
        }

        .no-scroll {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-title">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-title">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
        </div>

        <div class="game-board" id="game-board">
            <div class="grid" id="grid">
            </div>

            <div class="game-over-overlay" id="game-over-overlay">
                <div class="go-title">游戏结束</div>
                <div class="go-score" id="go-score">得分: 0</div>
                <button class="go-btn" id="restart-btn">再来一局</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>⬆ ⬇ ⬅ ➡</strong> 方向键移动 &nbsp;|&nbsp; 滑动屏幕触控</p>
            <p>相同数字合并，目标 <strong>2048</strong>！</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const gridEl = document.getElementById('grid');
            const scoreDisplay = document.getElementById('score');
            const bestScoreDisplay = document.getElementById('best-score');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const goScoreDisplay = document.getElementById('go-score');
            const restartBtn = document.getElementById('restart-btn');

            const SIZE = 4;
            const GAP = 12;
            const TILE_COLORS = {
                0: '#cdc1b4',
                2: '#eee4da',
                4: '#ede0c8',
                8: '#f2b179',
                16: '#f59563',
                32: '#f67c5f',
                64: '#f65e3b',
                128: '#edcf72',
                256: '#edcc61',
                512: '#edc850',
                1024: '#edc53f',
                2048: '#edc22e',
                4096: '#60d992',
                8192: '#3c9a6e'
            };

            let board = [];
            let tiles = [];
            let tileIdCounter = 0;
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
            let isGameOver = false;
            let isMoving = false;

            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (_) {}
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => {});
                }
            }

            function playMoveSound() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.06);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch (_) {}
            }

            function playMergeSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(900, now + 0.14);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
                    osc.start(now);
                    osc.stop(now + 0.16);
                } catch (_) {}
            }

            function playWinSound() {
                if (!audioCtx) return;
                try {
                    const notes = [523, 659, 784, 1047];
                    const now = audioCtx.currentTime;
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        gain.gain.setValueAtTime(0.10, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.18);
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.18);
                    });
                } catch (_) {}
            }

            function playGameOverSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(120, now + 0.3);
                    gain.gain.setValueAtTime(0.06, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } catch (_) {}
            }

            function cloneBoard(b) {
                return b.map(row => [...row]);
            }

            function boardsEqual(a, b) {
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        if (a[i][j] !== b[i][j]) return false;
                    }
                }
                return true;
            }

            function getEmptyCells(b) {
                const cells = [];
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        if (b[i][j] === 0) cells.push({ row: i, col: j });
                    }
                }
                return cells;
            }

            function canMove(b) {
                if (getEmptyCells(b).length > 0) return true;
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        const v = b[i][j];
                        if (j < SIZE - 1 && b[i][j + 1] === v) return true;
                        if (i < SIZE - 1 && b[i + 1][j] === v) return true;
                    }
                }
                return false;
            }

            function checkWin(b) {
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        if (b[i][j] === 2048) return true;
                    }
                }
                return false;
            }

            function slideAndMergeRow(row) {
                let filtered = row.filter(v => v !== 0);
                let merged = [];
                let scoreGain = 0;
                let i = 0;
                while (i < filtered.length) {
                    if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
                        const val = filtered[i] * 2;
                        merged.push(val);
                        scoreGain += val;
                        i += 2;
                    } else {
                        merged.push(filtered[i]);
                        i++;
                    }
                }
                while (merged.length < SIZE) merged.push(0);
                return { result: merged, scoreGain };
            }

            function performMove(b, direction) {
                let newBoard = cloneBoard(b);
                let totalGain = 0;

                if (direction === 'left') {
                    for (let i = 0; i < SIZE; i++) {
                        const { result, scoreGain } = slideAndMergeRow(newBoard[i]);
                        newBoard[i] = result;
                        totalGain += scoreGain;
                    }
                } else if (direction === 'right') {
                    for (let i = 0; i < SIZE; i++) {
                        const reversed = [...newBoard[i]].reverse();
                        const { result, scoreGain } = slideAndMergeRow(reversed);
                        newBoard[i] = result.reverse();
                        totalGain += scoreGain;
                    }
                } else if (direction === 'up') {
                    for (let j = 0; j < SIZE; j++) {
                        const col = [];
                        for (let i = 0; i < SIZE; i++) col.push(newBoard[i][j]);
                        const { result, scoreGain } = slideAndMergeRow(col);
                        for (let i = 0; i < SIZE; i++) newBoard[i][j] = result[i];
                        totalGain += scoreGain;
                    }
                } else if (direction === 'down') {
                    for (let j = 0; j < SIZE; j++) {
                        const col = [];
                        for (let i = 0; i < SIZE; i++) col.push(newBoard[i][j]);
                        const reversed = col.reverse();
                        const { result, scoreGain } = slideAndMergeRow(reversed);
                        const final = result.reverse();
                        for (let i = 0; i < SIZE; i++) newBoard[i][j] = final[i];
                        totalGain += scoreGain;
                    }
                }

                const moved = !boardsEqual(b, newBoard);
                return { moved, scoreGain: totalGain, newBoard };
            }

            function syncTilesFromBoard(b) {
                const cellMap = new Map();
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        if (b[i][j] !== 0) {
                            cellMap.set(`${i},${j}`, { value: b[i][j], row: i, col: j });
                        }
                    }
                }

                const existingMap = new Map();
                tiles.forEach(t => {
                    existingMap.set(`${t.row},${t.col}`, t);
                });

                const newTiles = [];
                const usedIds = new Set();

                for (const [key, data] of cellMap) {
                    const [row, col] = key.split(',').map(Number);
                    const existing = existingMap.get(key);
                    if (existing && existing.value === data.value) {
                        existing.row = row;
                        existing.col = col;
                        existing.value = data.value;
                        newTiles.push(existing);
                        usedIds.add(existing.id);
                    } else {
                        const tile = {
                            id: tileIdCounter++,
                            value: data.value,
                            row,
                            col,
                            el: null,
                            merged: false,
                            appear: true,
                        };
                        newTiles.push(tile);
                    }
                }

                tiles.forEach(t => {
                    if (!usedIds.has(t.id) && t.el && t.el.parentNode) {
                        t.el.parentNode.removeChild(t.el);
                    }
                });

                newTiles.forEach(t => { t.merged = false; });

                tiles = newTiles;
                return tiles;
            }

            function spawnTile(b) {
                const empty = getEmptyCells(b);
                if (empty.length === 0) return null;
                const idx = Math.floor(Math.random() * empty.length);
                const { row, col } = empty[idx];
                const value = Math.random() < 0.9 ? 2 : 4;
                b[row][col] = value;
                const tile = {
                    id: tileIdCounter++,
                    value,
                    row,
                    col,
                    el: null,
                    merged: false,
                    appear: true,
                };
                tiles.push(tile);
                return tile;
            }

            function getTilePosition(row, col) {
                const gridRect = gridEl.getBoundingClientRect();
                const gridWidth = gridRect.width;
                const gapPx = GAP;
                const cellSize = (gridWidth - gapPx * (SIZE - 1)) / SIZE;
                const left = col * (cellSize + gapPx);
                const top = row * (cellSize + gapPx);
                return { left, top, cellSize };
            }

            function renderTiles() {
                const gridRect = gridEl.getBoundingClientRect();
                const gridWidth = gridRect.width;
                const gapPx = GAP;
                const cellSize = (gridWidth - gapPx * (SIZE - 1)) / SIZE;

                tiles.forEach(tile => {
                    const { left, top } = getTilePosition(tile.row, tile.col);
                    let el = tile.el;

                    if (!el) {
                        el = document.createElement('div');
                        el.className = 'tile';
                        el.style.width = cellSize + 'px';
                        el.style.height = cellSize + 'px';
                        el.style.left = left + 'px';
                        el.style.top = top + 'px';
                        el.style.backgroundColor = TILE_COLORS[tile.value] || '#cdc1b4';
                        el.style.color = tile.value > 4 ? '#f9f6f2' : '#776e65';
                        el.style.fontSize = Math.min(cellSize * 0.45, 48) + 'px';
                        el.textContent = tile.value;
                        gridEl.appendChild(el);
                        tile.el = el;
                        if (tile.appear) {
                            el.classList.add('tile-appear');
                            setTimeout(() => el.classList.remove('tile-appear'), 200);
                            tile.appear = false;
                        }
                    } else {
                        el.style.width = cellSize + 'px';
                        el.style.height = cellSize + 'px';
                        el.style.left = left + 'px';
                        el.style.top = top + 'px';
                        el.style.backgroundColor = TILE_COLORS[tile.value] || '#cdc1b4';
                        el.style.color = tile.value > 4 ? '#f9f6f2' : '#776e65';
                        el.style.fontSize = Math.min(cellSize * 0.45, 48) + 'px';
                        el.textContent = tile.value;
                        if (tile.merged) {
                            el.classList.remove('tile-merged');
                            void el.offsetWidth;
                            el.classList.add('tile-merged');
                            setTimeout(() => el.classList.remove('tile-merged'), 250);
                            tile.merged = false;
                        }
                    }
                });

                const existingIds = new Set(tiles.map(t => t.id));
                const children = gridEl.querySelectorAll('.tile');
                children.forEach(el => {
                    let found = false;
                    for (const t of tiles) {
                        if (t.el === el) { found = true; break; }
                    }
                    if (!found) {
                        el.remove();
                    }
                });
            }

            function updateScoreUI() {
                scoreDisplay.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestScore2048', String(bestScore));
                }
                bestScoreDisplay.textContent = bestScore;
            }

            function showGameOver() {
                isGameOver = true;
                goScoreDisplay.textContent = `得分: ${score}`;
                gameOverOverlay.classList.add('show');
                playGameOverSound();
            }

            function hideGameOver() {
                isGameOver = false;
                gameOverOverlay.classList.remove('show');
            }

            function initGame() {
                board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
                tiles.forEach(t => {
                    if (t.el && t.el.parentNode) t.el.parentNode.removeChild(t.el);
                });
                tiles = [];
                tileIdCounter = 0;
                score = 0;
                isGameOver = false;
                hideGameOver();
                updateScoreUI();

                spawnTile(board);
                spawnTile(board);

                renderTiles();
                updateScoreUI();

                initAudio();
            }

            function doMove(direction) {
                if (isMoving || isGameOver) return;

                if (!canMove(board)) {
                    showGameOver();
                    return;
                }

                const oldBoard = cloneBoard(board);

                const { moved, scoreGain, newBoard } = performMove(board, direction);
                if (!moved) return;

                playMoveSound();

                board = newBoard;
                score += scoreGain;
                updateScoreUI();

                syncTilesFromBoard(board);

                if (scoreGain > 0) {
                    for (let i = 0; i < SIZE; i++) {
                        for (let j = 0; j < SIZE; j++) {
                            const newVal = board[i][j];
                            const oldVal = oldBoard[i][j];
                            if (newVal !== 0 && newVal !== oldVal && newVal > oldVal) {
                                for (const tile of tiles) {
                                    if (tile.row === i && tile.col === j && tile.value === newVal) {
                                        tile.merged = true;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                    if (scoreGain > 0) {
                        playMergeSound();
                    }
                }

                renderTiles();

                if (checkWin(board)) {
                    playWinSound();
                    setTimeout(() => {
                        alert('🎉 恭喜你达到 2048！');
                    }, 300);
                }

                const newTile = spawnTile(board);
                if (newTile) {
                    renderTiles();
                }

                if (!canMove(board)) {
                    showGameOver();
                }

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestScore2048', String(bestScore));
                    bestScoreDisplay.textContent = bestScore;
                }

                isMoving = false;
            }

            let touchStartX = 0;
            let touchStartY = 0;
            let isTouching = false;

            function handleTouchStart(e) {
                const touch = e.touches[0];
                if (!touch) return;
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isTouching = true;
                initAudio();
            }

            function handleTouchMove(e) {
                e.preventDefault();
                if (!isTouching) return;
                const touch = e.touches[0];
                if (!touch) return;
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;
                if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

                isTouching = false;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) doMove('right');
                    else doMove('left');
                } else {
                    if (dy > 0) doMove('down');
                    else doMove('up');
                }

                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }

            function handleTouchEnd(e) {
                isTouching = false;
            }

            function handleKeydown(e) {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                    e.preventDefault();
                    initAudio();
                    const map = {
                        'ArrowLeft': 'left',
                        'ArrowRight': 'right',
                        'ArrowUp': 'up',
                        'ArrowDown': 'down'
                    };
                    doMove(map[key]);
                }
            }

            let resizeTimer = null;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    renderTiles();
                }, 100);
            }

            function init() {
                gridEl.innerHTML = '';
                for (let i = 0; i < SIZE; i++) {
                    for (let j = 0; j < SIZE; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        gridEl.appendChild(cell);
                    }
                }

                initGame();

                bestScoreDisplay.textContent = bestScore;

                document.addEventListener('keydown', handleKeydown);

                const boardEl = document.getElementById('game-board');
                boardEl.addEventListener('touchstart', handleTouchStart, { passive: true });
                boardEl.addEventListener('touchmove', handleTouchMove, { passive: false });
                boardEl.addEventListener('touchend', handleTouchEnd, { passive: true });
                boardEl.addEventListener('touchcancel', handleTouchEnd, { passive: true });

                window.addEventListener('resize', handleResize);

                restartBtn.addEventListener('click', () => {
                    initAudio();
                    initGame();
                    hideGameOver();
                    renderTiles();
                    updateScoreUI();
                });

                restartBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    initAudio();
                    initGame();
                    hideGameOver();
                    renderTiles();
                    updateScoreUI();
                });

                renderTiles();
                updateScoreUI();

                console.log('🎮 2048 游戏已启动！');
            }

            init();

            window.__game = {
                board,
                tiles,
                score,
                doMove,
                initGame,
                renderTiles,
            };

        });
    </script>

</body>
</html>
