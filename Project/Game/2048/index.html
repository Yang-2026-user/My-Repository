<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048游戏</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            /* 防止页面滑动 */;
        }

        /* ===== 游戏容器 ===== */
        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            touch-action: none;
        }

        /* ===== 顶部栏 ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 10px;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            color: #776e65;
            line-height: 1;
            flex-shrink: 0;
        }

        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* ===== 分数盒子 ===== */
        .score-box {
            background-color: #bbada0;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            text-align: center;
            min-width: 60px;
        }
        .score-box .score-title {
            font-size: 11px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .score-box .score-value {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
        }

        /* ===== 新游戏按钮 ===== */
        .btn-new {
            background-color: #8f7a66;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: manipulation;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .btn-new:hover {
            background-color: #9f8b76;
        }
        .btn-new:active {
            transform: scale(0.95);
        }

        /* ===== 游戏面板 ===== */
        .game-board {
            background-color: #bbada0;
            border-radius: 8px;
            padding: 12px;
            position: relative;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        /* ===== 4x4 网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .cell {
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 4px;
            aspect-ratio: 1 / 1;
            /* 保持正方形 */
            position: relative;
            transition: background 0.1s;
        }

        /* ===== 方块 ===== */
        .tile {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 800;
            border-radius: 4px;
            transition: transform 0.08s ease, background 0.12s;
            will-change: transform;
            backface-visibility: hidden;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        /* ===== 颜色映射 ===== */
        .tile-0 {
            background-color: transparent;
        }
        .tile-2 {
            background-color: #eee4da;
            color: #776e65;
        }
        .tile-4 {
            background-color: #ede0c8;
            color: #776e65;
        }
        .tile-8 {
            background-color: #f2b179;
            color: #f9f6f2;
        }
        .tile-16 {
            background-color: #f59563;
            color: #f9f6f2;
        }
        .tile-32 {
            background-color: #f67c5f;
            color: #f9f6f2;
        }
        .tile-64 {
            background-color: #f65e3b;
            color: #f9f6f2;
        }
        .tile-128 {
            background-color: #edcf72;
            color: #f9f6f2;
            font-size: 28px;
        }
        .tile-256 {
            background-color: #edcc61;
            color: #f9f6f2;
            font-size: 28px;
        }
        .tile-512 {
            background-color: #edc850;
            color: #f9f6f2;
            font-size: 28px;
        }
        .tile-1024 {
            background-color: #edc53f;
            color: #f9f6f2;
            font-size: 24px;
        }
        .tile-2048 {
            background-color: #edc22e;
            color: #f9f6f2;
            font-size: 24px;
            box-shadow: 0 0 30px 10px rgba(237, 194, 46, 0.35);
        }
        /* 超大数字（4096+） */
        .tile-super {
            background-color: #3c3a32;
            color: #f9f6f2;
            font-size: 20px;
        }

        /* ===== 游戏结束遮罩 ===== */
        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            z-index: 10;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .game-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .game-overlay .overlay-title {
            font-size: 42px;
            font-weight: 900;
            color: #776e65;
            margin-bottom: 8px;
        }
        .game-overlay .overlay-sub {
            font-size: 18px;
            color: #776e65;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .game-overlay .btn-retry {
            background-color: #8f7a66;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 700;
            padding: 12px 40px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .game-overlay .btn-retry:hover {
            background-color: #9f8b76;
        }
        .game-overlay .btn-retry:active {
            transform: scale(0.95);
        }

        /* ===== 说明文字 ===== */
        .instructions {
            font-size: 14px;
            line-height: 1.6;
            margin-top: 16px;
            color: #776e65;
            opacity: 0.8;
            text-align: center;
        }
        .instructions strong {
            opacity: 1;
        }
        .instructions .hint-mobile {
            display: none;
        }

        /* ================================================================
                   响应式设计
                   ================================================================ */

        /* 手机小屏 (宽度 < 420px) */
        @media (max-width: 420px) {
            body {
                padding: 10px;
            }
            .title {
                font-size: 34px;
            }
            .game-board {
                padding: 8px;
                border-radius: 6px;
            }
            .grid {
                gap: 8px;
            }
            .tile {
                font-size: 22px;
                border-radius: 3px;
            }
            .tile-128,
            .tile-256,
            .tile-512 {
                font-size: 20px;
            }
            .tile-1024,
            .tile-2048 {
                font-size: 17px;
            }
            .tile-super {
                font-size: 15px;
            }
            .score-box {
                padding: 4px 10px;
                min-width: 48px;
            }
            .score-box .score-title {
                font-size: 9px;
            }
            .score-box .score-value {
                font-size: 16px;
            }
            .btn-new {
                font-size: 13px;
                padding: 6px 12px;
            }
            .header {
                margin-bottom: 10px;
                gap: 6px;
            }
            .header-right {
                gap: 5px;
            }
            .game-overlay .overlay-title {
                font-size: 30px;
            }
            .game-overlay .overlay-sub {
                font-size: 15px;
            }
            .game-overlay .btn-retry {
                font-size: 17px;
                padding: 10px 30px;
            }
            .instructions {
                font-size: 12px;
                margin-top: 12px;
            }
            .instructions .hint-desktop {
                display: none;
            }
            .instructions .hint-mobile {
                display: inline;
            }
        }

        /* 手机中屏 (420px ~ 600px) */
        @media (min-width: 421px) and (max-width: 600px) {
            .title {
                font-size: 40px;
            }
            .game-board {
                padding: 10px;
            }
            .grid {
                gap: 10px;
            }
            .tile {
                font-size: 28px;
            }
            .tile-128,
            .tile-256,
            .tile-512 {
                font-size: 24px;
            }
            .tile-1024,
            .tile-2048 {
                font-size: 20px;
            }
            .tile-super {
                font-size: 17px;
            }
            .score-box .score-value {
                font-size: 18px;
            }
            .btn-new {
                font-size: 14px;
                padding: 7px 14px;
            }
            .instructions .hint-desktop {
                display: none;
            }
            .instructions .hint-mobile {
                display: inline;
            }
        }

        /* 平板 & 桌面 (宽度 > 600px) */
        @media (min-width: 601px) {
            .title {
                font-size: 56px;
            }
            .tile {
                font-size: 36px;
            }
            .tile-128,
            .tile-256,
            .tile-512 {
                font-size: 32px;
            }
            .tile-1024,
            .tile-2048 {
                font-size: 28px;
            }
            .tile-super {
                font-size: 24px;
            }
            .score-box {
                padding: 8px 20px;
                min-width: 72px;
            }
            .score-box .score-title {
                font-size: 13px;
            }
            .score-box .score-value {
                font-size: 24px;
            }
            .btn-new {
                font-size: 17px;
                padding: 10px 22px;
            }
            .game-board {
                padding: 15px;
            }
            .grid {
                gap: 15px;
            }
            .instructions .hint-desktop {
                display: inline;
            }
            .instructions .hint-mobile {
                display: none;
            }
        }

        /* 小屏设备安全区适配 */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-top: max(16px, env(safe-area-inset-top));
                padding-bottom: max(16px, env(safe-area-inset-bottom));
            }
        }

        /* ===== 方块出现动画（可选） ===== */
        .tile-pop {
            animation: pop 0.12s ease-out;
        }
        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .tile-merge {
            animation: merge 0.15s ease-out;
        }
        @keyframes merge {
            0% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- ===== 顶部 ===== -->
        <div class="header">
            <div class="title">2048</div>
            <div class="header-right">
                <button class="btn-new" id="btnNewGame">新游戏</button>
                <div class="score-box">
                    <div class="score-title">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-title">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
        </div>

        <!-- ===== 游戏面板 ===== -->
        <div class="game-board" id="gameBoard">
            <div class="grid" id="grid"></div>

            <!-- 游戏结束 / 胜利 遮罩 -->
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-title" id="overlayTitle">游戏结束</div>
                <div class="overlay-sub" id="overlaySub">再试一次吧</div>
                <button class="btn-retry" id="btnRetry">再来一局</button>
            </div>
        </div>

        <!-- ===== 说明 ===== -->
        <div class="instructions">
            <p>
                <strong>游戏规则：</strong>
                使用 <span class="hint-desktop">键盘方向键 (↑↓←→) </span>
                <span class="hint-mobile">滑动屏幕 </span>
                移动方块，相同数字相撞会合并。
                每次移动后随机出现 2 或 4。
                <br>目标：拼出 <strong>2048</strong>！
            </p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //   DOM 引用
            // ============================================================
            const grid = document.getElementById('grid');
            const scoreDisplay = document.getElementById('score');
            const bestScoreDisplay = document.getElementById('best-score');
            const gameOverlay = document.getElementById('gameOverlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const btnNewGame = document.getElementById('btnNewGame');
            const btnRetry = document.getElementById('btnRetry');
            const gameBoard = document.getElementById('gameBoard');

            // ============================================================
            //   状态
            // ============================================================
            const SIZE = 4;
            let board = [];
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
            let gameOver = false;
            let gameWon = false;
            let isAnimating = false; // 简单防连点

            // 颜色映射（值 → CSS class）
            const tileClassMap = {
                0: 'tile-0',
                2: 'tile-2',
                4: 'tile-4',
                8: 'tile-8',
                16: 'tile-16',
                32: 'tile-32',
                64: 'tile-64',
                128: 'tile-128',
                256: 'tile-256',
                512: 'tile-512',
                1024: 'tile-1024',
                2048: 'tile-2048',
            };

            // ============================================================
            //   初始化
            // ============================================================
            function initGame() {
                // 重置棋盘
                board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
                score = 0;
                gameOver = false;
                gameWon = false;
                isAnimating = false;
                scoreDisplay.textContent = '0';
                gameOverlay.classList.remove('show');

                // 生成初始方块
                addRandomTile();
                addRandomTile();

                render();
                updateBestScore();
            }

            // ============================================================
            //   添加随机方块
            // ============================================================
            function addRandomTile() {
                const empty = [];
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c] === 0) empty.push({ r, c });
                    }
                }
                if (empty.length === 0) return null;
                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                board[r][c] = value;
                return { r, c, value };
            }

            // ============================================================
            //   渲染
            // ============================================================
            function render(animations) {
                // 确保网格存在
                if (grid.children.length === 0) {
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            const cell = document.createElement('div');
                            cell.className = 'cell';
                            cell.dataset.row = r;
                            cell.dataset.col = c;
                            grid.appendChild(cell);
                        }
                    }
                }

                const cells = grid.children;
                let idx = 0;
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const cell = cells[idx];
                        const val = board[r][c];
                        // 移除旧 tile
                        const oldTile = cell.querySelector('.tile');
                        if (oldTile) cell.removeChild(oldTile);

                        if (val !== 0) {
                            const tile = document.createElement('div');
                            tile.className = 'tile ' + (tileClassMap[val] || 'tile-super');
                            tile.textContent = val;
                            // 动画 class
                            if (animations && animations.some(a => a.r === r && a.c === c)) {
                                tile.classList.add('tile-pop');
                            }
                            cell.appendChild(tile);
                        }
                        idx++;
                    }
                }
            }

            // ============================================================
            //   滑动 & 合并（核心）
            // ============================================================
            function slideRow(row) {
                // 去掉 0
                let filtered = row.filter(v => v !== 0);
                let merged = [];
                let scoreGain = 0;
                let mergePositions = [];

                for (let i = 0; i < filtered.length; i++) {
                    if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
                        const val = filtered[i] * 2;
                        merged.push(val);
                        scoreGain += val;
                        mergePositions.push(merged.length - 1);
                        i++; // 跳过下一个
                    } else {
                        merged.push(filtered[i]);
                    }
                }
                // 补 0
                while (merged.length < SIZE) merged.push(0);
                return { row: merged, scoreGain, mergePositions };
            }

            function move(direction) {
                if (gameOver || isAnimating) return false;
                if (isBoardFull() && !hasMoves()) {
                    showGameOver(false);
                    return false;
                }

                let moved = false;
                let totalScoreGain = 0;
                let newTile = null;
                const anims = [];

                // 深拷贝旧棋盘
                const oldBoard = board.map(row => [...row]);

                // 根据方向处理
                if (direction === 'left') {
                    for (let r = 0; r < SIZE; r++) {
                        const result = slideRow(board[r]);
                        board[r] = result.row;
                        totalScoreGain += result.scoreGain;
                        if (result.scoreGain > 0) moved = true;
                        // 记录合并位置用于动画
                        result.mergePositions.forEach(pos => {
                            anims.push({ r, c: pos });
                        });
                    }
                } else if (direction === 'right') {
                    for (let r = 0; r < SIZE; r++) {
                        const reversed = [...board[r]].reverse();
                        const result = slideRow(reversed);
                        board[r] = result.row.reverse();
                        totalScoreGain += result.scoreGain;
                        if (result.scoreGain > 0) moved = true;
                        result.mergePositions.forEach(pos => {
                            anims.push({ r, c: SIZE - 1 - pos });
                        });
                    }
                } else if (direction === 'up') {
                    for (let c = 0; c < SIZE; c++) {
                        const col = [];
                        for (let r = 0; r < SIZE; r++) col.push(board[r][c]);
                        const result = slideRow(col);
                        for (let r = 0; r < SIZE; r++) board[r][c] = result.row[r];
                        totalScoreGain += result.scoreGain;
                        if (result.scoreGain > 0) moved = true;
                        result.mergePositions.forEach(pos => {
                            anims.push({ r: pos, c });
                        });
                    }
                } else if (direction === 'down') {
                    for (let c = 0; c < SIZE; c++) {
                        const col = [];
                        for (let r = SIZE - 1; r >= 0; r--) col.push(board[r][c]);
                        const result = slideRow(col);
                        for (let r = 0; r < SIZE; r++) board[SIZE - 1 - r][c] = result.row[r];
                        totalScoreGain += result.scoreGain;
                        if (result.scoreGain > 0) moved = true;
                        result.mergePositions.forEach(pos => {
                            anims.push({ r: SIZE - 1 - pos, c });
                        });
                    }
                }

                // 检查是否真正移动了
                const boardChanged = JSON.stringify(oldBoard) !== JSON.stringify(board);

                if (!boardChanged) {
                    return false;
                }

                // 更新分数
                if (totalScoreGain > 0) {
                    score += totalScoreGain;
                    scoreDisplay.textContent = score;
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('bestScore2048', String(bestScore));
                        bestScoreDisplay.textContent = bestScore;
                    }
                }

                // 添加新方块
                const added = addRandomTile();
                if (added) {
                    anims.push({ r: added.r, c: added.c });
                }

                // 渲染（带动画）
                render(anims);

                // 检查胜利
                if (!gameWon && checkWin()) {
                    gameWon = true;
                    showGameOver(true);
                }

                // 检查游戏结束
                if (isBoardFull() && !hasMoves()) {
                    showGameOver(false);
                }

                return true;
            }

            // ============================================================
            //   工具函数
            // ============================================================
            function isBoardFull() {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c] === 0) return false;
                    }
                }
                return true;
            }

            function hasMoves() {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const val = board[r][c];
                        if (val === 0) return true;
                        // 检查右边
                        if (c + 1 < SIZE && board[r][c + 1] === val) return true;
                        // 检查下边
                        if (r + 1 < SIZE && board[r + 1][c] === val) return true;
                    }
                }
                return false;
            }

            function checkWin() {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c] === 2048) return true;
                    }
                }
                return false;
            }

            function updateBestScore() {
                bestScoreDisplay.textContent = bestScore;
            }

            // ============================================================
            //   显示游戏结束 / 胜利
            // ============================================================
            function showGameOver(won) {
                if (gameOver) return;
                gameOver = true;
                if (won) {
                    overlayTitle.textContent = '🎉 恭喜通关！';
                    overlaySub.textContent = '你拼出了 2048！太棒了！';
                } else {
                    overlayTitle.textContent = '游戏结束';
                    overlaySub.textContent = `最终得分：${score}`;
                }
                gameOverlay.classList.add('show');
            }

            // ============================================================
            //   键盘控制
            // ============================================================
            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                    e.preventDefault();
                    const map = {
                        'ArrowLeft': 'left',
                        'ArrowRight': 'right',
                        'ArrowUp': 'up',
                        'ArrowDown': 'down'
                    };
                    move(map[key]);
                }
            });

            // ============================================================
            //   触摸控制
            // ============================================================
            let touchStartX = 0;
            let touchStartY = 0;
            let isTouching = false;
            const SWIPE_THRESHOLD = 30;

            gameBoard.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (!touch) return;
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isTouching = true;
            }, { passive: true });

            gameBoard.addEventListener('touchmove', (e) => {
                // 阻止页面滚动
                e.preventDefault();
            }, { passive: false });

            gameBoard.addEventListener('touchend', (e) => {
                if (!isTouching) return;
                isTouching = false;

                // 获取结束位置（从 changedTouches 取最后一个）
                const touch = e.changedTouches[0];
                if (!touch) return;

                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;

                if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
                    return; // 太短，忽略
                }

                let dir = null;
                if (Math.abs(dx) > Math.abs(dy)) {
                    dir = dx > 0 ? 'right' : 'left';
                } else {
                    dir = dy > 0 ? 'down' : 'up';
                }
                if (dir) move(dir);
            }, { passive: true });

            // ============================================================
            //   按钮事件
            // ============================================================
            btnNewGame.addEventListener('click', () => {
                initGame();
            });

            btnRetry.addEventListener('click', () => {
                initGame();
            });

            // ============================================================
            //   启动游戏
            // ============================================================
            initGame();

            // 窗口 resize 时重新渲染（保证布局）
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    render();
                }, 100);
            });

            // 暴露 move 给调试（可选）
            window.__debug = { move, board: () => board };

            console.log('🎮 2048 已加载 — 支持键盘 & 触摸滑动');
        })();
    </script>

</body>
</html>
