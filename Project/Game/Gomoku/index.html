<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.cn/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
<div class="background-overlay"></div>
<div class="game-container">
    <h1>Gomoku</h1>
    <div class="controls">
        <select id="game-mode" class="styled-select">
            <option value="ai">人机对战</option>
            <option value="human">双人对战</option>
        </select>
        <select id="ai-level" class="styled-select">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
            <option value="expert">专家</option>
            <option value="master">大师</option>
        </select>
        <button id="reset-btn" class="styled-button">重新开始</button>
    </div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="status" class="status-box">当前轮到：黑子</div>
</div>

<script src="js/game.js"></script>
</body>
</html>
