<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国象棋 v5.1.1</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            user-select: none;
        }
        body {
            --bg-start: #2c1810; --bg-end: #4a2c17;
            --text: #f5e6c8; --title: #f5d78a;
            --btn-bg: #8b4513; --btn-border: #5c2d0f; --btn-hover: #a0522d; --btn-text: #f5e6c8;
            --status-bg: rgba(0,0,0,0.35); --status-text: #ffd88a;
            --opt-color: #d4b48a; --opt-active-bg: #8b4513; --opt-active-color: #ffd88a; --opt-active-border: #ffd88a;
            --opt-hover: rgba(255,255,255,0.15);
            --lang-bg: rgba(255,255,255,0.08); --lang-border: #5c2d0f; --lang-color: #d4b48a;
            --lang-hover: rgba(255,255,255,0.18);
            --fen-bg: rgba(0,0,0,0.35); --fen-border: #5c2d0f; --fen-btn-hover: rgba(255,255,255,0.18);
            --shadow: rgba(0,0,0,0.5);
            --board-bg: #e8c990; --board-border: #3d1e0a;
            --check-text: #ff6b6b; --over-text: #7dd87d; --thinking-text: #7ec8e3;
            --small-btn-bg: rgba(255,255,255,0.08); --small-btn-border: #5c2d0f; --small-btn-color: #d4b48a;
            --small-btn-hover: rgba(255,255,255,0.18);
            --theme-btn-border: #5c2d0f;
        }
        body.theme-dark {
            --bg-start: #1a1a2e; --bg-end: #16213e;
            --text: #d0d0d0; --title: #c9a96e;
            --btn-bg: #533483; --btn-border: #3b1f6e; --btn-hover: #6c4fa8; --btn-text: #e0d0f0;
            --status-bg: rgba(0,0,0,0.5); --status-text: #c9a96e;
            --opt-color: #b0a0c0; --opt-active-bg: #533483; --opt-active-color: #e0c070; --opt-active-border: #e0c070;
            --opt-hover: rgba(255,255,255,0.1);
            --lang-bg: rgba(255,255,255,0.05); --lang-border: #3b1f6e; --lang-color: #b0a0c0;
            --lang-hover: rgba(255,255,255,0.12);
            --fen-bg: rgba(0,0,0,0.5); --fen-border: #3b1f6e; --fen-btn-hover: rgba(255,255,255,0.12);
            --shadow: rgba(0,0,0,0.7);
            --board-bg: #3d3d3d; --board-border: #1a1a1a;
            --check-text: #ff8a8a; --over-text: #8ae88a; --thinking-text: #8ac8e8;
            --small-btn-bg: rgba(255,255,255,0.05); --small-btn-border: #3b1f6e; --small-btn-color: #b0a0c0;
            --small-btn-hover: rgba(255,255,255,0.12);
            --theme-btn-border: #3b1f6e;
        }
        body.theme-light {
            --bg-start: #f5f0e8; --bg-end: #e8dcc8;
            --text: #4a3728; --title: #8b4513;
            --btn-bg: #8b4513; --btn-border: #6b3410; --btn-hover: #a0522d; --btn-text: #fff;
            --status-bg: rgba(139,69,19,0.12); --status-text: #6b3410;
            --opt-color: #6b4a2e; --opt-active-bg: #8b4513; --opt-active-color: #fff; --opt-active-border: #8b4513;
            --opt-hover: rgba(139,69,19,0.1);
            --lang-bg: rgba(139,69,19,0.08); --lang-border: #8b4513; --lang-color: #6b4a2e;
            --lang-hover: rgba(139,69,19,0.18);
            --fen-bg: rgba(139,69,19,0.08); --fen-border: #8b4513; --fen-btn-hover: rgba(139,69,19,0.18);
            --shadow: rgba(0,0,0,0.2);
            --board-bg: #faf3e0; --board-border: #5c3a1e;
            --check-text: #d32f2f; --over-text: #2e7d32; --thinking-text: #1565c0;
            --small-btn-bg: rgba(139,69,19,0.08); --small-btn-border: #8b4513; --small-btn-color: #6b4a2e;
            --small-btn-hover: rgba(139,69,19,0.18);
            --theme-btn-border: #8b4513;
        }
        body.theme-jade {
            --bg-start: #1a3a2a; --bg-end: #2d5a3d;
            --text: #d4e8c0; --title: #a8d8a0;
            --btn-bg: #3a6a3a; --btn-border: #2a4a2a; --btn-hover: #4a8a4a; --btn-text: #d4e8c0;
            --status-bg: rgba(0,0,0,0.35); --status-text: #a8d8a0;
            --opt-color: #a0c8a0; --opt-active-bg: #3a6a3a; --opt-active-color: #d0ffd0; --opt-active-border: #a0d8a0;
            --opt-hover: rgba(255,255,255,0.1);
            --lang-bg: rgba(255,255,255,0.08); --lang-border: #2a4a2a; --lang-color: #a0c8a0;
            --lang-hover: rgba(255,255,255,0.15);
            --fen-bg: rgba(0,0,0,0.35); --fen-border: #2a4a2a; --fen-btn-hover: rgba(255,255,255,0.15);
            --shadow: rgba(0,0,0,0.5);
            --board-bg: #c8d8b0; --board-border: #2a4a2a;
            --check-text: #ff8a8a; --over-text: #8ae88a; --thinking-text: #8ac8e8;
            --small-btn-bg: rgba(255,255,255,0.08); --small-btn-border: #2a4a2a; --small-btn-color: #a0c8a0;
            --small-btn-hover: rgba(255,255,255,0.15);
            --theme-btn-border: #2a4a2a;
        }
        body.theme-navy {
            --bg-start: #1a2035; --bg-end: #2c3e6b;
            --text: #c8d8f0; --title: #8ab4f8;
            --btn-bg: #3b5998; --btn-border: #2a4a7a; --btn-hover: #4a6ab8; --btn-text: #d0d8f0;
            --status-bg: rgba(0,0,0,0.35); --status-text: #8ab4f8;
            --opt-color: #a0b8e0; --opt-active-bg: #3b5998; --opt-active-color: #c0d8ff; --opt-active-border: #a0b8e0;
            --opt-hover: rgba(255,255,255,0.1);
            --lang-bg: rgba(255,255,255,0.08); --lang-border: #2a4a7a; --lang-color: #a0b8e0;
            --lang-hover: rgba(255,255,255,0.15);
            --fen-bg: rgba(0,0,0,0.35); --fen-border: #2a4a7a; --fen-btn-hover: rgba(255,255,255,0.15);
            --shadow: rgba(0,0,0,0.5);
            --board-bg: #b0c4de; --board-border: #1a2a4a;
            --check-text: #ff8a8a; --over-text: #8ae88a; --thinking-text: #8ac8e8;
            --small-btn-bg: rgba(255,255,255,0.08); --small-btn-border: #2a4a7a; --small-btn-color: #a0b8e0;
            --small-btn-hover: rgba(255,255,255,0.15);
            --theme-btn-border: #2a4a7a;
        }
        body {
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
        }
        .app { display: flex; flex-direction: column; align-items: center; padding: 12px; min-height: 100vh; }
        .header-row {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; max-width: 560px; flex-wrap: wrap;
        }
        h1 {
            font-size: clamp(18px, 4vw, 26px); margin: 6px 0 10px;
            color: var(--title); letter-spacing: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); flex: 1; text-align: center;
        }
        .lang-btn {
            background: var(--lang-bg); border: 1px solid var(--lang-border);
            border-radius: 6px; color: var(--lang-color); cursor: pointer;
            font-size: clamp(12px,2.5vw,14px); padding: 4px 10px; transition: all 0.15s;
            height: 30px; flex-shrink: 0;
        }
        .lang-btn:hover { background: var(--lang-hover); }
        .lang-btn.active { background: var(--btn-bg); color: var(--opt-active-color); border-color: var(--opt-active-border); }
        .status {
            font-size: clamp(13px,3vw,16px); margin-bottom: 10px; padding: 6px 14px;
            background: var(--status-bg); border-radius: 8px; min-height: 28px;
            text-align: center; color: var(--status-text); width: 100%; max-width: 560px;
        }
        .status.check { color: var(--check-text); font-weight: bold; }
        .status.over { color: var(--over-text); font-weight: bold; }
        .status.thinking { color: var(--thinking-text); font-weight: bold; }
        .board-wrap { width: 100%; max-width: 560px; display: flex; justify-content: center; }
        canvas {
            width: 100%; height: auto; background: var(--board-bg);
            border: 3px solid var(--board-border); border-radius: 6px;
            box-shadow: 0 8px 24px var(--shadow); touch-action: manipulation; display: block;
        }
        .controls { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 10px 20px; font-size: clamp(13px,3vw,15px); background: var(--btn-bg);
            color: var(--btn-text); border: 2px solid var(--btn-border); border-radius: 8px;
            cursor: pointer; font-weight: bold; letter-spacing: 2px;
            transition: all 0.15s; box-shadow: 0 3px 6px var(--shadow);
        }
        .btn:hover:not(:disabled) { background: var(--btn-hover); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 1px 3px var(--shadow); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-small { padding: 6px 12px; font-size: clamp(11px,2.5vw,13px); letter-spacing: 1px; }
        .option-row {
            margin-top: 10px; display: flex; gap: 8px; align-items: center;
            flex-wrap: wrap; justify-content: center; font-size: clamp(12px,2.8vw,14px); color: var(--opt-color);
        }
        .option-row.hidden { display: none; }
        .option-row button {
            padding: 6px 12px; background: var(--small-btn-bg); color: var(--small-btn-color);
            border: 1px solid var(--small-btn-border); border-radius: 6px; cursor: pointer;
            font-size: inherit; transition: all 0.15s;
        }
        .option-row button.active { background: var(--opt-active-bg); color: var(--opt-active-color); border-color: var(--opt-active-border); }
        .option-row button:hover:not(.active) { background: var(--opt-hover); }
        .icon-btn { padding: 6px 10px !important; min-width: 40px; }
        .theme-dot {
            display: inline-block; width: 14px; height: 14px; border-radius: 50%;
            margin-right: 2px; vertical-align: middle; border: 1px solid var(--theme-btn-border);
        }
        .fen-section {
            margin-top: 10px; width: 100%; max-width: 560px; display: none; flex-direction: column; gap: 6px;
        }
        .fen-section.visible { display: flex; }
        .fen-textarea {
            width: 100%; height: 50px; background: var(--fen-bg); color: var(--text);
            border: 1px solid var(--fen-border); border-radius: 6px; padding: 8px;
            font-family: monospace; font-size: 12px; resize: vertical;
        }
        .fen-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .fen-buttons button {
            padding: 5px 10px; background: var(--small-btn-bg); color: var(--small-btn-color);
            border: 1px solid var(--small-btn-border); border-radius: 6px; cursor: pointer;
            font-size: 12px; transition: all 0.15s;
        }
        .fen-buttons button:hover { background: var(--fen-btn-hover); }
        @media (min-width: 768px) { .board-wrap { max-width: 600px; } }
        @media (max-height: 700px) and (orientation: landscape) {
            h1 { margin: 4px 0 6px; font-size: 18px; letter-spacing: 4px; }
            .status { margin-bottom: 6px; padding: 4px 10px; }
            .controls { margin-top: 8px; } .btn { padding: 8px 14px; }
            .option-row { margin-top: 6px; } .header-row { gap: 6px; }
            .lang-btn { height: 26px; font-size: 11px; padding: 2px 8px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header-row">
            <h1 id="game-title">中 国 象 棋</h1>
            <button class="lang-btn active" id="btn-lang-zh">中文</button>
            <button class="lang-btn" id="btn-lang-en">English</button>
        </div>
        <div class="status" id="status">红方先行</div>
        <div class="board-wrap">
            <canvas id="board"></canvas>
        </div>
        <div class="option-row">
            <span id="lbl-mode">模式：</span>
            <button id="mode-pvp" class="active" data-key="modePvp">双人对战</button>
            <button id="mode-ai" data-key="modeAi">人机对战</button>
            <span style="margin-left:10px;" id="lbl-sound">音效：</span>
            <button id="btn-sound" class="icon-btn active">🔊</button>
        </div>
        <div class="option-row" id="theme-row">
            <span id="lbl-theme">主题：</span>
            <button data-theme="classic" class="active"><span class="theme-dot" style="background:#e8c990;"></span>经典</button>
            <button data-theme="dark"><span class="theme-dot" style="background:#3d3d3d;"></span>暗黑</button>
            <button data-theme="light"><span class="theme-dot" style="background:#faf3e0;"></span>明亮</button>
            <button data-theme="jade"><span class="theme-dot" style="background:#c8d8b0;"></span>翡翠</button>
            <button data-theme="navy"><span class="theme-dot" style="background:#b0c4de;"></span>海军</button>
        </div>
        <div class="option-row" id="difficulty-row" style="display:none;">
            <span id="lbl-diff">难度：</span>
            <button data-level="easy" data-key="diffEasy">简单</button>
            <button data-level="normal" class="active" data-key="diffNormal">普通</button>
            <button data-level="hard" data-key="diffHard">困难</button>
            <button data-level="master" data-key="diffMaster">大师</button>
        </div>
        <div class="controls">
            <button class="btn" id="btn-undo" data-key="undo">悔 棋</button>
            <button class="btn" id="btn-restart" data-key="restart">重新开始</button>
            <button class="btn btn-small" id="btn-save" data-key="save">保 存</button>
            <button class="btn btn-small" id="btn-load" data-key="load">加 载</button>
            <button class="btn btn-small" id="btn-fen" data-key="fen">FEN</button>
        </div>
        <div class="fen-section" id="fen-section">
            <textarea class="fen-textarea" id="fen-textarea" placeholder="FEN 格式..."></textarea>
            <div class="fen-buttons">
                <button id="btn-fen-expcopy">导出/复制</button>
                <button id="btn-fen-download">下载 .fen</button>
                <button id="btn-fen-import">导入 FEN</button>
            </div>
        </div>
    </div>

    <script>
    'use strict';
    // ============================================================
    //  中国象棋 v5.1
    //  - 修复: QS 递归深度限制 / endgameKnowledge 清理 / saveGame 错误提示
    //  - 修复: FEN 按钮音效 / makeBranch 空值防御
    //  - 清理: clearSearchState() 提取 / PIECE_VALUE 死代码移除
    //  - 新增: FEN 导出/复制合并 + 下载按钮
    //  - 新增: 5 套主题切换 + localStorage 持久化
    //  - 修复: 切换英文时 FEN 面板按钮文字未翻译
    // ============================================================

    const I18N = {
        zh: {
            title:'中 国 象 棋',mode:'模式',diff:'难度',theme:'主题',
            redTurn:'红方先行',blackTurn:'黑方行棋',
            redThinking:'红方思考中...',blackThinking:'黑方思考中...',
            redWin:'红方胜！（将死）',blackWin:'黑方胜！（将死）',
            drawStalemate:'和棋！（困毙）',drawRepetition:'和棋！（重复局面）',
            drawFifty:'和棋！（50回合自然限着）',
            checkRed:'红方被将军！',checkBlack:'黑方被将军！',
            undoRequest:'请求悔棋（将回退 1 步）',
            undoDenied:'电脑不同意悔棋。',undoApproved:'电脑同意悔棋。',
            onlyPlayerUndo:'只有玩家回合才能悔棋。',
            noMovesToUndo:'没有足够的步数可悔棋。',
            modePvp:'双人对战',modeAi:'人机对战',
            diffEasy:'简单',diffNormal:'普通',diffHard:'困难',diffMaster:'大师',
            themeClassic:'经典',themeDark:'暗黑',themeLight:'明亮',themeJade:'翡翠',themeNavy:'海军',
            sound:'音效',undo:'悔 棋',restart:'重新开始',
            save:'保 存',load:'加 载',fen:'FEN',
            thinking:'电脑思考中...',
            saved:'已保存。',loaded:'已加载。',noSave:'没有存档。',
            saveFailed:'保存失败。',loadFailed:'加载失败。',
            fenImported:'FEN 已导入。',fenInvalid:'FEN 格式无效。',
            fenCopied:'已复制到剪贴板。',fenDownloaded:'已下载。',
            fenExportCopy:'导出/复制',fenDownload:'下载 .fen',fenImport:'导入 FEN'
        },
        en: {
            title:'Chinese Chess',mode:'Mode',diff:'Difficulty',theme:'Theme',
            redTurn:"Red's turn",blackTurn:"Black's turn",
            redThinking:"Red is thinking...",blackThinking:"Black is thinking...",
            redWin:'Red wins! (Checkmate)',blackWin:'Black wins! (Checkmate)',
            drawStalemate:'Draw! (Stalemate)',drawRepetition:'Draw! (Repetition)',
            drawFifty:'Draw! (50-move rule)',
            checkRed:'Red is in check!',checkBlack:'Black is in check!',
            undoRequest:'Request undo (1 move back)',
            undoDenied:'Computer denies undo.',undoApproved:'Computer approves undo.',
            onlyPlayerUndo:'Only player can undo.',
            noMovesToUndo:'Not enough moves to undo.',
            modePvp:'2 Players',modeAi:'vs AI',
            diffEasy:'Easy',diffNormal:'Normal',diffHard:'Hard',diffMaster:'Master',
            themeClassic:'Classic',themeDark:'Dark',themeLight:'Light',themeJade:'Jade',themeNavy:'Navy',
            sound:'Sound',undo:'Undo',restart:'Restart',
            save:'Save',load:'Load',fen:'FEN',
            thinking:'Computer is thinking...',
            saved:'Saved.',loaded:'Loaded.',noSave:'No save found.',
            saveFailed:'Save failed.',loadFailed:'Load failed.',
            fenImported:'FEN imported.',fenInvalid:'Invalid FEN.',
            fenCopied:'Copied to clipboard.',fenDownloaded:'Downloaded.',
            fenExportCopy:'Export/Copy',fenDownload:'Download .fen',fenImport:'Import FEN'
        }
    };
    let currentLang = 'zh';
    function t(k) { return (I18N[currentLang] && I18N[currentLang][k]) ? I18N[currentLang][k] : k; }

    // ---- 常量 ----
    const RED='red',BLACK='black',ROWS=10,COLS=9;
    const PIECE_NAMES={K:'帅',A:'仕',B:'相',N:'馬',R:'車',C:'炮',P:'兵',k:'将',a:'士',b:'象',n:'马',r:'车',c:'砲',p:'卒'};
    const PIECE_NAMES_EN={K:'King',A:'Advisor',B:'Elephant',N:'Horse',R:'Rook',C:'Cannon',P:'Pawn',k:'King',a:'Advisor',b:'Elephant',n:'Horse',r:'Rook',c:'Cannon',p:'Pawn'};
    const PIECE_TYPES=['K','A','B','N','R','C','P'];
    const PIECE_INDEX={}; PIECE_TYPES.forEach((t,i)=>{PIECE_INDEX[t]=i;PIECE_INDEX[t.toLowerCase()]=i;});
    const PIECE_VALUE={K:100000,A:120,B:120,N:400,R:900,C:450,P:100};

        resetBoard(){
            this.board=createEmptyBoard();
            this.board[0]=['r','n','b','a','k','a','b','n','r'];this.board[2][1]='c';this.board[2][7]='c';
            for(let c=0;c<9;c+=2)this.board[3][c]='p';

        // ---- 规则 ----
        pseudoMoves(from,bd){
            const piece=bd[from.row][from.col];if(!piece)return[];const me=this.colorOf(piece),type=piece.toUpperCase(),moves=[];
            const inB=(r,c)=>r>=0&&r<ROWS&&c>=0&&c<COLS;
            switch(type){
            case'K':{const pr=me===RED?[7,8,9]:[0,1,2],pc=[3,4,5];for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=from.row+dr,nc=from.col+dc;if(pr.includes(nr)&&pc.includes(nc)){const t=bd[nr][nc];if(!t||this.colorOf(t)!==me)moves.push({row:nr,col:nc});}}for(let r=0;r<ROWS;r++){if(r===from.row)continue;const p=bd[r][from.col];if(p&&p.toUpperCase()==='K'&&this.colorOf(p)!==me){let clear=true;const[s,e]=r<from.row?[r+1,from.row-1]:[from.row+1,r-1];for(let rr=s;rr<=e;rr++){if(bd[rr][from.col]){clear=false;break;}}if(clear)moves.push({row:r,col:from.col});}}break;}
            case'A':{const pr=me===RED?[7,8,9]:[0,1,2],pc=[3,4,5];for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){const nr=from.row+dr,nc=from.col+dc;if(pr.includes(nr)&&pc.includes(nc)){const t=bd[nr][nc];if(!t||this.colorOf(t)!==me)moves.push({row:nr,col:nc});}}break;}

            case'P':{const fwd=me===RED?-1:1,crossed=me===RED?from.row<=4:from.row>=5,dirs=[[fwd,0]];if(crossed){dirs.push([0,-1]);dirs.push([0,1]);}for(const[dr,dc]of dirs){const nr=from.row+dr,nc=from.col+dc;if(!inB(nr,nc))continue;const t=bd[nr][nc];if(!t||this.colorOf(t)!==me)moves.push({row:nr,col:nc});}break;}

        isInCheck(color,bd){let kp=null;const king=color===RED?'K':'k';for(let r=0;r<ROWS&&!kp;r++)for(let c=0;c<COLS&&!kp;c++)if(bd[r][c]===king)kp={row:r,col:c};if(!kp)return true;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const p=bd[r][c];if(!p||this.colorOf(p)===color)continue;const ms=this.pseudoMoves({row:r,col:c},bd);for(const m of ms)if(m.row===kp.row&&m.col===kp.col)return true;}return false;}

        setStatusText(key,cls){this.statusEl.textContent=t(key)||key;this.statusEl.className='status'+(cls?' '+cls:'');}

        // ---- 渲染 ----
        boardToPixel(r,c){return{x:this.paddingX+c*this.cellSize,y:this.paddingY+r*this.cellSize};}
        pixelToBoard(x,y){const c=Math.round((x-this.paddingX)/this.cellSize),r=Math.round((y-this.paddingY)/this.cellSize);if(r<0||r>=ROWS||c<0||c>=COLS)return null;const p=this.boardToPixel(r,c);if(Math.hypot(x-p.x,y-p.y)>this.cellSize*0.5)return null;return{row:r,col:c};}

        drawPiece(r,c,piece){

        importFEN(fen){if(!fen||!fen.trim()){this.setStatusText('fenInvalid');return;}try{const parts=fen.trim().split(/\s+/),rows=parts[0].split('/');if(rows.length!==ROWS){this.setStatusText('fenInvalid');return;}const newBoard=createEmptyBoard(),validPieces=new Set(['K','A','B','N','R','C','P','k','a','b','n','r','c','p']);for(let r=0;r<ROWS;r++){let c=0;for(const ch of rows[r]){if(ch>='1'&&ch<='9'){c+=parseInt(ch);continue;}if(!validPieces.has(ch)){this.setStatusText('fenInvalid');return;}if(c>=COLS){this.setStatusText('fenInvalid');return;}newBoard[r][c]=ch;c++;}if(c!==COLS){this.setStatusText('fenInvalid');return;}}this.board=newBoard;this.currentPlayer=(parts[1]==='b')?BLACK:RED;this._halfmoveClock=parseInt(parts[4])||0;this.selected=null;this.legalTargets=[];this.aiThinking=false;this.history=[];this.lastMove=null;this.positionMap=new Map();const h0=this.hashFromScratch(this.board,this.currentPlayer);this.positionMap.set(h0,1);this._lastHash=h0;this.gameOver=false;this.clearSearchState();this.setStatusText('fenImported');this.updateStatusText();this.draw();}catch(e){this.setStatusText('fenInvalid');}}

            if(bpc>0&&rpc===0){if(bHasR)bonus-=800;else if(bHasC&&!bHasN)bonus-=0;else if(bHasN&&!bHasC)bonus-=0;else bonus-=300;}

        // ---- 走法排序 ----

        negamax(bd,depth,alpha,beta,color,ply,hash){
            this.nodesSearched++;if((this.nodesSearched&2047)===0)if(Date.now()-this.searchStartTime>this.searchTimeLimit){this.searchAborted=true;return 0;}
            let repeat=0;for(let i=0;i<this.hashStack.length;i++){if(this.hashStack[i]===hash)repeat++;if(repeat>=2)return 0;}
            const cfg=DIFFICULTY[this.difficulty];
            if(cfg.useTT&&ply>0){const tt=this.ttLookup(hash);if(tt&&tt.depth>=depth){if(tt.flag==='exact')return tt.score;if(tt.flag==='lower'&&tt.score>alpha)alpha=tt.score;if(tt.flag==='upper'&&tt.score<beta)beta=tt.score;if(alpha>=beta)return tt.score;}}
            if(depth<=0){if(cfg.useQS)return this.quiescence(bd,alpha,beta,color,ply,hash);return(color===RED?1:-1)*this.evaluate(bd);}
            const inCheck=this.isInCheck(color,bd);
            if(cfg.useNullMove&&depth>=3&&!inCheck&&this.countMaterial(bd)>6){const nullHash=hash^this.zobristSide;this.hashStack.push(nullHash);const R=3+(depth>6?1:0),nullScore=-this.negamax(bd,depth-1-R,-beta,-beta+1,opponentColor(color),ply+1,nullHash);this.hashStack.pop();if(this.searchAborted)return 0;if(nullScore>=beta)return beta;}
            const moves=this.allLegalMoves(color,bd);if(moves.length===0)return-99900+ply;
            const extension=inCheck?1:0,newDepth=depth+extension;
            const ttEntry=(cfg.useTT&&ply>0)?this.ttLookup(hash):null,ttMove=ttEntry?ttEntry.move:null;this.orderMoves(moves,bd,ttMove,ply);
            let best=-Infinity,bestMv=moves[0];const originalAlpha=alpha;
            for(let i=0;i<moves.length;i++){const mv=moves[i],cap=bd[mv.to.row][mv.to.col],piece=bd[mv.from.row][mv.from.col];bd[mv.to.row][mv.to.col]=piece;bd[mv.from.row][mv.from.col]=null;const newHash=this.updateHash(hash,mv.from,mv.to,piece,cap);this.hashStack.push(newHash);const childScore=-this.negamax(bd,newDepth-1,-beta,-alpha,opponentColor(color),ply+1,newHash);this.hashStack.pop();bd[mv.from.row][mv.from.col]=piece;bd[mv.to.row][mv.to.col]=cap;if(this.searchAborted)return 0;if(childScore>best){best=childScore;bestMv=mv;}if(best>alpha)alpha=best;if(alpha>=beta){if(cfg.hh){const idx=PIECE_INDEX[piece];this.hh[idx][mv.to.row*COLS+mv.to.col]=(this.hh[idx][mv.to.row*COLS+mv.to.col]||0)+(1<<Math.min(depth,10));if(!cap)this.addKiller(mv,ply);}break;}}
            if(cfg.useTT&&ply>0&&!this.searchAborted){let flag='exact';if(best<=originalAlpha)flag='upper';else if(best>=beta)flag='lower';this.ttStore(hash,best,depth,flag,bestMv);}
            return best;
        }

        // ---- 搜索 ----
        searchBestMove(depth,color){
            const moves=this.allLegalMoves(color,this.board);if(moves.length===0)return null;if(moves.length===1)return{move:moves[0],score:0};
            const cfg=DIFFICULTY[this.difficulty];if(cfg.opening&&this.history.length<=8){const book=this.lookupOpeningMove(color);if(book)return{move:book,score:0};}
            let best=null;const targetDepth=cfg.iterDeep?depth:Math.min(2,depth);
            for(let d=(cfg.iterDeep?1:targetDepth);d<=targetDepth;d++){this.searchAborted=false;this.orderMoves(moves,this.board,best?best.move:null,0);let layerBest=-Infinity,layerMove=moves[0],alpha=-Infinity,beta=Infinity;for(let i=0;i<moves.length;i++){const mv=moves[i],cap=this.board[mv.to.row][mv.to.col],piece=this.board[mv.from.row][mv.from.col];this.board[mv.to.row][mv.to.col]=piece;this.board[mv.from.row][mv.from.col]=null;const newHash=this.updateHash(this._lastHash,mv.from,mv.to,piece,cap);this.hashStack=[newHash];const childScore=-this.negamax(this.board,d-1,-beta,-alpha,opponentColor(color),1,newHash);this.hashStack=[];this.board[mv.from.row][mv.from.col]=piece;this.board[mv.to.row][mv.to.col]=cap;if(this.searchAborted)break;if(childScore>layerBest){layerBest=childScore;layerMove=mv;}if(layerBest>alpha)alpha=layerBest;}if(!this.searchAborted)best={move:layerMove,score:layerBest};if(this.searchAborted)break;if(Date.now()-this.searchStartTime>this.searchTimeLimit*0.85)break;}
            if(!best)best={move:moves[0],score:0};return best;
        }

        // ---- 开局库 ----
        lookupOpeningMove(color){const h=this.hashFromScratch(this.board,color);if(!this._openingBook)this._openingBook=this.buildOpeningBook();return this._openingBook.get(h)||null;}
        buildOpeningBook(){
            const book=new Map();const setMove=(bd,col,move)=>{book.set(this.hashFromScratch(bd,col),move);};const makeBranch=(bd,col,fr,fc,tr,tc,cb)=>{if(!bd[fr][fc])return;const nb=cloneBoard(bd);nb[tr][tc]=nb[fr][fc];nb[fr][fc]=null;setMove(bd,col,{from:{row:fr,col:fc},to:{row:tr,col:tc}});if(cb)cb(nb,opponentColor(col));};
            const bd=createEmptyBoard();bd[0]=['r','n','b','a','k','a','b','n','r'];bd[2][1]='c';bd[2][7]='c';for(let c=0;c<9;c+=2)bd[3][c]='p';bd[9]=['R','N','B','A','K','A','B','N','R'];bd[7][1]='C';bd[7][7]='C';for(let c=0;c<9;c+=2)bd[6][c]='P';
            makeBranch(bd,RED,7,4,2,4,(b1,c1)=>{makeBranch(b1,BLACK,0,1,2,2,(b2,c2)=>{makeBranch(b2,RED,9,1,7,2);});makeBranch(b1,BLACK,2,7,2,4);});
            makeBranch(bd,RED,9,2,7,4,(b1,c1)=>{makeBranch(b1,BLACK,0,7,2,4);});
            makeBranch(bd,RED,9,1,7,2,(b1,c1)=>{makeBranch(b1,BLACK,3,6,4,6);});
            makeBranch(bd,RED,6,0,5,0,(b1,c1)=>{makeBranch(b1,BLACK,2,1,2,0);});
            makeBranch(bd,RED,7,4,7,3,(b1,c1)=>{makeBranch(b1,BLACK,0,1,2,2);});
            makeBranch(bd,RED,7,4,7,5,(b1,c1)=>{makeBranch(b1,BLACK,0,1,2,2);});
            const bd_alt=cloneBoard(bd);bd_alt[2][4]='C';bd_alt[7][4]=null;bd_alt[2][2]='n';bd_alt[0][1]=null;setMove(bd_alt,BLACK,{from:{row:3,col:2},to:{row:4,col:2}});
            return book;
        }

        // ---- AI 主循环 ----
        aiThinkAndMove(){
            this.aiThinking=true;this.setStatusText('thinking','thinking');
            setTimeout(()=>{const cfg=DIFFICULTY[this.difficulty];this.searchStartTime=Date.now();this.searchTimeLimit=cfg.timeMs;this.nodesSearched=0;this.searchAborted=false;this.ttGeneration++;
                let result=this.searchBestMove(cfg.depth,BLACK);
                if(cfg.randomness>0&&result&&Math.random()*100<cfg.randomness){const moves=this.allLegalMoves(BLACK,this.board);if(moves.length>1){for(let i=0;i<moves.length;i++){const mv=moves[i],piece=this.board[mv.from.row][mv.from.col],cap=this.board[mv.to.row][mv.to.col];this.board[mv.to.row][mv.to.col]=piece;this.board[mv.from.row][mv.from.col]=null;mv._score=-this.evaluate(this.board);this.board[mv.from.row][mv.from.col]=piece;this.board[mv.to.row][mv.to.col]=cap;}moves.sort((a,b)=>(a._score||0)-(b._score||0));const topN=Math.min(5,moves.length);result={move:moves[Math.floor(Math.random()*topN)],score:0};}}
                if(!result||!result.move){const ms=this.allLegalMoves(BLACK,this.board);if(ms.length===0){this.aiThinking=false;return;}result={move:ms[0],score:0};}
                this.makeMoveUI(result.move.from,result.move.to);this.aiThinking=false;
            },30);
        }
    }

    window.addEventListener('DOMContentLoaded',()=>{
        const game=new ChessGame({
            canvas:document.getElementById('board'),statusEl:document.getElementById('status'),
            undoBtn:document.getElementById('btn-undo'),restartBtn:document.getElementById('btn-restart'),
            modePvpBtn:document.getElementById('mode-pvp'),modeAiBtn:document.getElementById('mode-ai'),
            difficultyRow:document.getElementById('difficulty-row'),soundBtn:document.getElementById('btn-sound'),
            langZhBtn:document.getElementById('btn-lang-zh'),langEnBtn:document.getElementById('btn-lang-en'),
            titleEl:document.getElementById('game-title'),
            saveBtn:document.getElementById('btn-save'),loadBtn:document.getElementById('btn-load'),
            fenBtn:document.getElementById('btn-fen'),fenSection:document.getElementById('fen-section'),
            fenTextarea:document.getElementById('fen-textarea'),
            fenExpCopyBtn:document.getElementById('btn-fen-expcopy'),fenDownloadBtn:document.getElementById('btn-fen-download'),
            fenImportBtn:document.getElementById('btn-fen-import'),
            themeRow:document.getElementById('theme-row')
        });window.__chess=game;
    });
    </script>
